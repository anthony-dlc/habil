    <main>
      <form action="https://formspree.io/f/xvzjgddq" method="post">
        <img
          src="./assets/images/habil-logo-light.svg"
          alt="Habil"
          title="Habil"
        />
        <button type="button" class="cerrar-formulario">
          <a href="./index.html"
            ><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>cerrar</title>
              <path
                d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"
              /></svg
          ></a>
        </button>
        <h2 class="encabezado">Registro de técnico</h2>
        <fieldset class="d-personales-contenedor">
          <legend>DATOS PERSONALES</legend>
          <div class="input-contenedor">
            <label for="nombre" class="requerido">Nombre <span>*</span></label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Ej: jon"
              required
            />
          </div>
          <div class="input-contenedor">
            <label for="apellido" class="requerido"
              >Apellido <span>*</span></label
            >
            <input
              type="text"
              id="apellido"
              name="apellido"
              placeholder="Ej: rodriguez"
              required
            />
          </div>
          <div class="input-contenedor">
            <label for="telefono" class="requerido"
              >Teléfono <span>*</span></label
            >
            <input
              type="tel"
              id="telefono"
              name="telefono"
              placeholder="Ej: 809-000-0000"
              pattern="^\+?1?\d{10}$"
              required
            />
          </div>
          <div class="input-contenedor">
            <label for="whatsapp">Whatsapp</label>
            <input
              type="text"
              id="whatsapp"
              name="whatsapp"
              pattern="^\+?1?\d{10}$"
              placeholder="Ej: 809-000-0000"
            />
          </div>
        </fieldset>
        <hr />
        <fieldset>
          <legend>TU ESPECIALIDAD</legend>
          <div class="input-contenedor">
            <label for="especialidad">Categoría principal <span>*</span></label>
            <input
              class="requerido"
              type="text"
              id="especialidad"
              name="especialidad"
              placeholder="Ej: Cuál es tu especialidad?"
              required
            />
          </div>
          <div class="input-contenedor">
            <label for="zona-de-servicio"
              >Zona de servicio <span>*</span></label
            >
            <input
              class="requerido"
              type="text"
              id="zona-de-servicio"
              name="zona-de-servicio"
              placeholder="Ej: Santiago norte, pueblo nuevo..."
              required
            />
          </div>
          <div class="input-contenedor">
            <label for="experiencia">Años de experiencia</label>
            <select name="experiencia" id="experiencia">
              <option value="1-3 años">1-3 años</option>
              <option value="3-5 años">3-5 años</option>
              <option value="5-10 años">5-10 años</option>
              <option value="10+ años">10+ años</option>
            </select>
          </div>
        </fieldset>
        <hr />
        <fieldset>
          <legend>PRESENTACION</legend>
          <label for="servicios">¿Qué servicios ofreces? <span>*</span></label>
          <textarea
            class="requerido servicios-ofrecidos"
            name="servicios"
            id="servicios"
            placeholder="Ej: Instalaciones eléctricas, mantenimiento de aires acondicionados..."
            required
          ></textarea>
        </fieldset>
        <button type="submit" class="quiero-unirme">Quiero unirme</button>
        <input
          type="hidden"
          name="_next"
          value="https://habil.com.do/gracias.html"
        />
      </form>
    </main>
